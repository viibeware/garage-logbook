<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Garage Logbook</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg-base:#0f1117;--bg-raised:#161822;--bg-surface:#1c1f2e;--border:#2a2d3e;--border-focus:#4f7df5;--text-primary:#e8eaf0;--text-secondary:#8b90a5;--text-muted:#5c6078;--accent:#4f7df5;--accent-hover:#6b93ff;--red:#ef5350;--green:#66bb6a}
        html{font-size:1.2rem}
        body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-base);color:var(--text-primary);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
        .login-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
        .login-brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:32px}
        .login-brand img{width:64px;height:64px}
        .login-brand h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.02em}
        .login-brand .corp{font-size:0.6rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:-6px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-size:0.75rem;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
        .form-group input{width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font:inherit;font-size:0.85rem;padding:11px 14px;outline:none;transition:border-color 0.2s}
        .form-group input:focus{border-color:var(--border-focus)}
        .btn-login{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:6px;font:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:6px}
        .btn-login:hover{background:var(--accent-hover)}.btn-login:disabled{opacity:0.5;cursor:not-allowed}
        .error-msg{color:var(--red);font-size:0.78rem;text-align:center;margin-top:14px;min-height:20px}
        .login-version{text-align:center;margin-top:18px;font-size:0.58rem;color:var(--text-muted);letter-spacing:0.05em}
        .pw-change-panel{display:none}.pw-change-panel.active{display:block}
        .login-panel{display:block}.login-panel.hidden{display:none}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand"><img src="/static/garage-logbook_logo.svg" alt=""><h1>Garage Logbook</h1><span class="corp">viibeware Corp.</span></div>
        <div id="loginPanel" class="login-panel">
            <div class="form-group"><label>Username</label><input type="text" id="username" autocomplete="username" autofocus></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" autocomplete="current-password"></div>
            <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
            <div class="error-msg" id="loginError"></div>
        </div>
        <div id="pwChangePanel" class="pw-change-panel">
            <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:18px;text-align:center">You must change your password before continuing.</p>
            <div class="form-group"><label>New Password</label><input type="password" id="newPwFirst" placeholder="Min 4 characters" autocomplete="new-password"></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPwFirst" autocomplete="new-password"></div>
            <button class="btn-login" onclick="doFirstPwChange()">Set New Password</button>
            <div class="error-msg" id="pwChangeError"></div>
        </div>
        <div class="login-version">v{{ version }}</div>
    </div>
    <script>
        let tempOldPw='';
        document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
        document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('password').focus()});
        document.getElementById('confirmPwFirst').addEventListener('keydown',e=>{if(e.key==='Enter')doFirstPwChange()});
        async function doLogin(){const btn=document.getElementById('loginBtn'),err=document.getElementById('loginError');const u=document.getElementById('username').value.trim(),p=document.getElementById('password').value;err.textContent='';if(!u||!p){err.textContent='Enter username and password';return}btn.disabled=true;btn.textContent='Signing in…';try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error);if(d.must_change_password){tempOldPw=p;document.getElementById('loginPanel').classList.add('hidden');document.getElementById('pwChangePanel').classList.add('active');document.getElementById('newPwFirst').focus()}else{window.location.href='/'}}catch(e){err.textContent=e.message}finally{btn.disabled=false;btn.textContent='Sign In'}}
        async function doFirstPwChange(){const err=document.getElementById('pwChangeError');const np=document.getElementById('newPwFirst').value,cp=document.getElementById('confirmPwFirst').value;err.textContent='';if(!np||!cp){err.textContent='Fill both fields';return}if(np!==cp){err.textContent='Passwords do not match';return}if(np.length<4){err.textContent='Min 4 characters';return}try{const r=await fetch('/api/auth/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:tempOldPw,new_password:np})});const d=await r.json();if(!r.ok)throw new Error(d.error);window.location.href='/'}catch(e){err.textContent=e.message}}
    </script>
</body>
</html>
